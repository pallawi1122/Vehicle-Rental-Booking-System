<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

<h1>Vehicle Rental System</h1>

</header>

<section class="payment-box">

<h2>Payment Details</h2>

<table>

<tr>

<th>Name</th>

<td>{{ booking.fullname }}</td>

</tr>

<tr>

<th>Vehicle</th>

<td>{{ booking.vehicle }}</td>

</tr>

<tr>

<th>Booking Date</th>

<td>{{ booking.booking_date }}</td>

</tr>

<tr>

<th>Total Amount</th>

<td>

₹ {{ booking.amount }}

</td>

</tr>

</table>

<br>

<form
action="/payment_success"
method="POST">

<h3>Select Payment Method</h3>

<label>

<input
type="radio"
name="payment_method"
value="UPI"
required>

UPI

</label>

<br><br>

<label>

<input
type="radio"
name="payment_method"
value="Debit Card">

Debit Card

</label>

<br><br>

<label>

<input
type="radio"
name="payment_method"
value="Credit Card">

Credit Card

</label>

<br><br>

<label>

<input
type="radio"
name="payment_method"
value="Cash">

Cash

</label>

<br><br>

<button type="submit">

Pay Now

</button>

</form>

</section>

<footer>

<p>

© 2026 Vehicle Rental Booking System

</p>

</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
