<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-container">

<h1>Vehicle Rental System</h1>

<h2>Login</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="flash-message">

{{ messages[0] }}

</div>

{% endif %}
{% endwith %}

<form action="/login_user" method="POST">

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">

Login

</button>

</form>

<br>

<p>

Don't have an account?

<a href="/register">

Register Here

</a>

</p>

<br>

<a href="/" class="btn">

⬅ Back To Home

</a>

</div>

</body>

</html>
